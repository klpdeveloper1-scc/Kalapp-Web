  // Create Priority Marker function
  function createPriorityMarker(priority, lat, lng) {
      var color;
      switch (priority) {
          case 'CRITICAL': color = '#ff0000'; break;
          case 'HIGH': color = '#ffa500'; break;
          case 'MEDIUM': color = '#0000ff'; break;
          case 'LOW': color = '#808080'; break;
      }
      return L.marker([lat, lng], { icon: L.divIcon({ className: 'priority-marker', style: `background-color: ${color};` }) });
  }

  // Build Complaint Popup function
  function buildComplaintPopup(complaint) {
