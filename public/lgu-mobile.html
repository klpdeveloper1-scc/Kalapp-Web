<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalapp - LGU Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp" rel="stylesheet">
    <style>
        :root {
            --color-primary: #4169E1; --color-danger: #ff6467; --color-success: #00bc7d; --color-warning: #fe9a00;
            --color-info-dark: #9f9fa9; --color-dark: #f8fafc; --color-background: #09090b; --card-bg: #121214;
            --glass-border: 1px solid rgba(255,255,255,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--color-background); color: var(--color-dark); overflow-x: hidden; }

        main { display: block; width: 100%; padding: 1rem 1rem 85px 1rem; min-height: 100vh; }

        .mobile-bottom-nav {
            display: flex; position: fixed; bottom: 0; left: 0; right: 0; height: 65px;
            background: var(--card-bg); justify-content: space-around; align-items: center;
            z-index: 1000; box-shadow: 0 -4px 15px rgba(0,0,0,0.5); border-top: var(--glass-border);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .mobile-bottom-nav button {
            background: none; border: none; display: flex; flex-direction: column; align-items: center;
            justify-content: center; font-size: 0.7rem; color: var(--color-info-dark); height: 100%; width: 100%;
            cursor: pointer; transition: color 0.2s;
        }
        .mobile-bottom-nav button.active { color: var(--color-primary); font-weight: 600; }
        .mobile-bottom-nav button span { font-size: 1.6rem; margin-bottom: 2px; }

        .card { background: var(--card-bg); border-radius: 16px; padding: 1.2rem; margin-bottom: 1rem; border: var(--glass-border); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; }
        .badge.Pending { background: rgba(255, 100, 103, 0.1); color: var(--color-danger); }
        .badge.Resolved { background: rgba(0, 188, 125, 0.1); color: var(--color-success); }
        
        /* Modal for actions */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: var(--card-bg); width: 100%; position: absolute; bottom: 0; padding: 2rem 1.5rem 85px; border-radius: 24px 24px 0 0; }
        .action-btn { width: 100%; padding: 1rem; border-radius: 12px; border: none; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; cursor: pointer; }
    </style>
</head>
<body>

    <main id="dashboard-page">
        <h2 style="margin-bottom: 1rem;">LGU Dashboard</h2>
        
        <div class="stat-grid">
            <div class="card" style="text-align:center;">
                <h4 style="color:var(--color-info-dark);">Pending</h4>
                <div style="font-size:2rem; font-weight:bold; color:var(--color-danger);" id="s-pending">0</div>
            </div>
            <div class="card" style="text-align:center;">
                <h4 style="color:var(--color-info-dark);">Resolved</h4>
                <div style="font-size:2rem; font-weight:bold; color:var(--color-success);" id="s-resolved">0</div>
            </div>
        </div>

        <h3 style="margin-bottom: 0.5rem;">Live Queue</h3>
        <div id="queue-list"></div>
    </main>

    <main id="lupon-page" style="display:none;">
        <h2 style="margin-bottom: 1rem; color:var(--color-warning);">⚖️ Lupon Cases</h2>
        <div id="lupon-list"></div>
    </main>

    <!-- Bottom Nav -->
    <nav class="mobile-bottom-nav">
        <button onclick="switchTab('dashboard')" class="active"><span class="material-icons-sharp">grid_view</span>Queue</button>
        <button onclick="switchTab('lupon')"><span class="material-icons-sharp">gavel</span>Lupon</button>
        <button onclick="logout()"><span class="material-icons-sharp" style="color:var(--color-danger);">logout</span>Exit</button>
    </nav>

    <!-- Action Modal -->
    <div id="actionModal" class="modal">
        <div class="modal-content">
            <h3 id="m-id" style="margin-bottom: 1rem; color:var(--color-primary);">#KAL-0000</h3>
            <input type="text" id="m-note" placeholder="Add LGU note..." style="width:100%; padding:1rem; border-radius:12px; background:rgba(255,255,255,0.05); border:var(--glass-border); color:white; margin-bottom:1rem;">
            
            <button class="action-btn" style="background:var(--color-warning); color:black;" onclick="updateStatus('In Progress')">Mark In Progress</button>
            <button class="action-btn" style="background:var(--color-success); color:black;" onclick="updateStatus('Resolved')">Mark Resolved</button>
            <button class="action-btn" style="background:rgba(255,255,255,0.1); color:white;" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://kalapp-web.onrender.com';
        const adminName = localStorage.getItem('kalapp_username') || 'LGU Mobile';
        let currentComplaintId = null;

        function switchTab(tab) {
            document.getElementById('dashboard-page').style.display = tab === 'dashboard' ? 'block' : 'none';
            document.getElementById('lupon-page').style.display = tab === 'lupon' ? 'block' : 'none';
            document.querySelectorAll('.mobile-bottom-nav button').forEach(b => b.classList.remove('active'));
            document.querySelector(`.mobile-bottom-nav button[onclick="switchTab('${tab}')"]`).classList.add('active');
            window.scrollTo(0,0);
        }

        async function loadData() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/complaints`);
                const data = await res.json();
                
                document.getElementById('s-pending').innerText = data.complaints.filter(c => c.status === 'Pending').length;
                document.getElementById('s-resolved').innerText = data.complaints.filter(c => c.status === 'Resolved').length;

                const qList = document.getElementById('queue-list');
                qList.innerHTML = data.complaints.map(c => {
                    const statClass = c.status === 'Resolved' ? 'Resolved' : 'Pending';
                    return `
                    <div class="card" onclick="openActionModal('${c.trackingId}')">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <strong style="color:var(--color-primary);">${c.trackingId}</strong>
                            <span class="badge ${statClass}">${c.status || 'Pending'}</span>
                        </div>
                        <p style="font-size:0.85rem;">${c.category} - ${c.barangay}</p>
                        <p style="font-size:0.8rem; color:var(--color-info-dark); margin-top:5px;">By ${c.citizenName || 'Guest'}</p>
                    </div>`;
                }).join('');
            } catch(e) {}
        }

        function openActionModal(id) {
            currentComplaintId = id;
            document.getElementById('m-id').innerText = id;
            document.getElementById('actionModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('actionModal').style.display = 'none'; }

        async function updateStatus(status) {
            if(!currentComplaintId) return;
            const note = document.getElementById('m-note').value;
            await fetch(`${BACKEND_URL}/api/complaints/${currentComplaintId}/status`, {
                method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status, note, adminName })
            });
            closeModal(); document.getElementById('m-note').value = ''; loadData();
        }

        function logout() { localStorage.clear(); window.location.href = '/login.html'; }
        loadData();
    </script>
</body>
</html>
