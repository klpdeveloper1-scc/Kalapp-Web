<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalapp - Dashboard Router</title>
    <style>
        body { background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #94a3b8; }
        .loader { border: 4px solid #1e293b; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .container { text-align: center; }
    </style>
    <script>
        // Redirect logic based on device screen size and user agent
        document.addEventListener("DOMContentLoaded", () => {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 1024;
            setTimeout(() => {
                if (isMobile) {
                    window.location.replace("lgu-mobile.html");
                } else {
                    window.location.replace("lgu-desktop.html");
                }
            }, 500);
        });
    </script>
</head>
<body>
    <div class="container">
        <div class="loader" style="margin: 0 auto;"></div>
        <p>Securing connection & loading layout...</p>
    </div>
</body>
</html>
