<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalapp - Portal Router</title>
    <style>
        body { background: #f1f5f9; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #64748b; }
        .loader { border: 4px solid #e2e8f0; border-top: 4px solid #ff8c00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .container { text-align: center; }
    </style>
    <script>
        // Redirect logic based on device screen size and user agent
        document.addEventListener("DOMContentLoaded", () => {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 900;
            setTimeout(() => {
                if (isMobile) {
                    window.location.replace("citizen-mobile.html");
                } else {
                    window.location.replace("citizen-desktop.html");
                }
            }, 500); // 500ms delay to ensure the visual loader is seen briefly
        });
    </script>
</head>
<body>
    <div class="container">
        <div class="loader" style="margin: 0 auto;"></div>
        <p>Loading optimized layout...</p>
    </div>
</body>
</html>
